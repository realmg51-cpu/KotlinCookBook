<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="100%" stop-color="#FF5722"/>
    </linearGradient>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="200" height="200" rx="45" fill="url(#bgGrad)"/>
  
  <!-- Cooking pan (larger, centered better) -->
  <ellipse cx="100" cy="85" rx="55" ry="18" fill="#444"/>
  <ellipse cx="100" cy="85" rx="45" ry="12" fill="#666"/>
  <!-- Pan handle with rounded corner -->
  <rect x="145" y="75" width="35" height="10" rx="5" fill="#888"/>
  <rect x="175" y="78" width="10" height="4" rx="2" fill="#666"/>
  
  <!-- Steam from pan (animated) -->
  <path d="M75 70 Q70 55 78 40" fill="none" stroke="white" stroke-width="2.5" opacity="0.6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M100 65 Q95 50 103 35" fill="none" stroke="white" stroke-width="2.5" opacity="0.6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </path>
  
  <!-- K letter with shadow -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="80" fill="white" font-weight="bold" filter="url(#shadow)">K</text>
  
  <!-- Small decorations -->
  <g fill="#FFD700">
    <circle cx="45" cy="155" r="4">
      <animate attributeName="r" values="4;5;4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="155" cy="155" r="4">
      <animate attributeName="r" values="4;5;4" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="60" cy="170" r="3">
      <animate attributeName="r" values="3;4;3" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="140" cy="170" r="3">
      <animate attributeName="r" values="3;4;3" dur="1.8s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
  </g>
</svg>
