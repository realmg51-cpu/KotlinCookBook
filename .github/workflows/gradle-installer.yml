name: Download Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  download-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # ✅ v6 cho Node.js 24
      
      - name: Create gradle wrapper directory
        run: mkdir -p gradle/wrapper
      
      - name: Download gradle-wrapper.jar
        run: |
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar
      
      - name: Create gradle-wrapper.properties
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
      
      - name: Download gradlew script
        run: |
          curl -L -o gradlew \
            https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradlew
          chmod +x gradlew
      
      - name: Download gradlew.bat
        run: |
          curl -L -o gradlew.bat \
            https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradlew.bat
      
      - name: Commit and push
        run: |
          git config user.name "KotlinCookBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/ gradlew gradlew.bat
          git commit -m "📦 Add Gradle wrapper files" || echo "No changes to commit"
          git push
