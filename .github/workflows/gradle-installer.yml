name: Download Gradle Wrapper

on:
  workflow_dispatch:  # Bạn chạy thủ công từ GitHub

jobs:
  download-gradle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Cho phép commit lên repo
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Download Gradle 9.4.1 wrapper JAR
        run: |
          # Tạo thư mục nếu chưa có
          mkdir -p gradle/wrapper
          
          # Tải gradle-wrapper.jar từ GitHub raw
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar
          
          # Tạo gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
      
      - name: Tạo gradlew script (nếu chưa có)
        run: |
          if [ ! -f "gradlew" ]; then
            curl -L -o gradlew \
              https://raw.githubusercontent.com/gradle/gradle/v9.4.1/gradle/wrapper/gradle-wrapper.jar?raw=true
            # Thực ra cần gradlew script, dùng cách khác
            wget -O gradlew https://github.com/gradle/gradle/raw/v9.4.1/gradlew
            chmod +x gradlew
          fi
      
      - name: Commit và push lên repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/
          git add gradlew 2>/dev/null || true
          git commit -m "Download Gradle 9.4.1 wrapper files" || echo "No changes to commit"
          git push
