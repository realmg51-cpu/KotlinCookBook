name: Update Project Structure

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate structure and statistics
        run: |
          # Tạo nội dung structure
          cat > /tmp/structure.md << 'EOF'
          ## 📁 Project Structure
          
          ```
          EOF
          
          tree src/kotlin/normal --dirsfirst -I "*.md" -L 4 >> /tmp/structure.md
          
          cat >> /tmp/structure.md << 'EOF'
          ```
          
          EOF
          
          # Thống kê
          TOTAL=$(find src/kotlin/normal -name "*.kt" -type f | wc -l)
          CAT=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          MOST=$(find src/kotlin/normal -mindepth 2 -name "*.kt" 2>/dev/null | cut -d'/' -f4 | sort | uniq -c | sort -rn | head -1 | awk '{print $2 " (" $1 " files)"}')
          
          cat >> /tmp/structure.md << EOF
          ## 📊 Statistics
          
          | Metric | Value |
          |--------|-------|
          | 🍳 **Total Recipes** | \`$TOTAL\` Kotlin files |
          | 📁 **Categories** | \`$CAT\` folders |
          | 📈 **Most recipes** | $MOST |
          
          ---
          
          <img src=".github/avatars/bot.svg" width="40">
          
          *Auto-updated by KotlinCookBot 🤖*
          *Last update: $(date +'%Y-%m-%d %H:%M:%S UTC')*
          
          EOF
      
      - name: Update README with Python
        run: |
          python3 << 'PYTHON_EOF'
          import re
          
          # Đọc nội dung mới
          with open('/tmp/structure.md', 'r') as f:
              new_content = f.read().strip()
          
          # Đọc README hiện tại
          with open('README.md', 'r') as f:
              readme = f.read()
          
          # Xóa section cũ (nếu có)
          readme = re.sub(
              r'<!-- STRUCTURE_START -->.*?<!-- STRUCTURE_END -->',
              '',
              readme,
              flags=re.DOTALL
          )
          
          # Xóa các dòng trống thừa
          readme = re.sub(r'\n{3,}', '\n\n', readme)
          
          # Tìm vị trí "Happy cooking"
          happy_pattern = r'(\*\*Happy cooking! 👨‍🍳🍳\*\*)'
          
          # Nội dung mới với markers
          replacement = f'<!-- STRUCTURE_START -->\n{new_content}\n<!-- STRUCTURE_END -->\n\n\\1'
          
          if re.search(happy_pattern, readme):
              # Chèn vào trước "Happy cooking"
              new_readme = re.sub(happy_pattern, replacement, readme)
          else:
              # Nếu không tìm thấy, thêm vào cuối file
              new_readme = readme.rstrip() + f'\n\n<!-- STRUCTURE_START -->\n{new_content}\n<!-- STRUCTURE_END -->\n'
          
          # Đảm bảo không có dòng trống ở cuối
          new_readme = new_readme.rstrip() + '\n'
          
          # Ghi lại README
          with open('README.md', 'w') as f:
              f.write(new_readme)
          
          print("✅ README updated successfully")
          print(f"📊 Statistics: {new_content[:200]}...")
          PYTHON_EOF
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 docs: update project structure and statistics [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "KotlinCookBot <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "README.md"
      
      - name: Summary
        run: |
          echo "## 🍳 Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Time | $(date +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍳 Recipes | $(find src/kotlin/normal -name '*.kt' | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "| 📁 Categories | $(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ README updated successfully!" >> $GITHUB_STEP_SUMMARY
