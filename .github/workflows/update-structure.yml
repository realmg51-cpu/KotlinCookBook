name: Update Project Structure

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate structure with echo
        run: |
          # Start with marker
          echo "<!-- STRUCTURE_START -->" > /tmp/new.md
          echo "" >> /tmp/new.md
          echo "## 📁 Project Structure" >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo '```' >> /tmp/new.md
          
          # Add tree output
          tree src/kotlin/normal --dirsfirst -I "*.md" -L 4 >> /tmp/new.md
          
          # Close code block
          echo '```' >> /tmp/new.md
          echo "" >> /tmp/new.md
          
          # Add statistics
          RECIPE_COUNT=$(find src/kotlin/normal -name "*.kt" -type f | wc -l)
          CATEGORY_COUNT=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)
          
          echo "### 📊 Statistics" >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo "| Metric | Value |" >> /tmp/new.md
          echo "|--------|-------|" >> /tmp/new.md
          echo "| 🍳 Recipes | \`$RECIPE_COUNT\` files |" >> /tmp/new.md
          echo "| 📁 Categories | \`$CATEGORY_COUNT\` folders |" >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo "---" >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo '<img src=".github/avatars/bot.svg" width="40">' >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo "*Last update: $(date +'%Y-%m-%d %H:%M:%S UTC')*" >> /tmp/new.md
          echo "" >> /tmp/new.md
          echo "<!-- STRUCTURE_END -->" >> /tmp/new.md
      
      - name: Remove old structure and replace
        run: |
          # Delete everything between markers (including markers)
          sed -i '/<!-- STRUCTURE_START -->/,/<!-- STRUCTURE_END -->/d' README.md
          
          # Append new structure at the end
          cat /tmp/new.md >> README.md
          
          # Clean up extra blank lines
          sed -i '/^$/N;/^\n$/D' README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📁 docs: update project structure [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md"
