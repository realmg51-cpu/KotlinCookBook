
name: Update Documentation

on:
  push:
    paths:
      - 'src/kotlin/normal/**'
      - '.github/workflows/update-docs.yml'
  workflow_dispatch:

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install tree
        run: sudo apt-get install -y tree
      
      - name: Generate Project Structure
        id: structure
        run: |
          cat > /tmp/structure.md << 'EOF'
          ## 📁 Project Structure
          
          ```
          EOF
          
          tree src/kotlin/normal --dirsfirst -I "*.md" -L 4 >> /tmp/structure.md
          
          cat >> /tmp/structure.md << 'EOF'
          ```
          
          ### 📊 Statistics
          
          | Metric | Value |
          |--------|-------|
          | 🍳 **Total Recipes** | `$(find src/kotlin/normal -name "*.kt" -type f | wc -l)` files |
          | 📁 **Categories** | `$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)` folders |
          
          ---
          
          <img src=".github/avatars/bot.svg" width="40">
          
          *Auto-updated by KotlinCookBot 🤖*
          *Last update: $(date +'%Y-%m-%d %H:%M:%S UTC')*
          
          EOF
      
      - name: Generate Recipe Appendix
        id: appendix
        run: |
          python3 << 'PYTHON_EOF'
          import os
          from pathlib import Path
          from datetime import datetime
          
          repo = os.environ.get('GITHUB_REPOSITORY', 'realmg51-cpu/KotlinCookBook')
          
          lines = []
          lines.append("# 📚 KotlinCookBook - Complete Recipe Appendix")
          lines.append("")
          lines.append('> *"All recipes in one place - your complete Kotlin cookbook index!"* 🍳')
          lines.append("")
          lines.append("| Recipe | Code | Introduction |")
          lines.append("|--------|------|--------------|")
          
          base = Path("src/kotlin/normal")
          count = 0
          intro_count = 0
          
          for kt_file in sorted(base.rglob("*.kt")):
              if "introduction" in str(kt_file).lower():
                  continue
              
              name = kt_file.name
              dir_path = kt_file.parent
              intro_file = dir_path / "introduction.md"
              
              code_url = f"https://github.com/{repo}/blob/main/{kt_file}"
              code_link = f"[🔗 Code]({code_url})"
              
              if intro_file.exists():
                  intro_url = f"https://github.com/{repo}/blob/main/{intro_file}"
                  intro_link = f"[📖 Intro]({intro_url})"
                  intro_count += 1
              else:
                  intro_link = "❌ No intro"
              
              lines.append(f"| `{name}` | {code_link} | {intro_link} |")
              count += 1
          
          lines.append("")
          lines.append("## Statistics")
          lines.append("")
          lines.append("| Metric | Value |")
          lines.append("|--------|-------|")
          lines.append(f"| 🍳 **Total Recipes** | `{count}` |")
          lines.append(f"| 📖 **With Introduction** | `{intro_count}` |")
          lines.append(f"| 🆕 **Last Updated** | {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')} |")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append('> *"Bookmark this page - it\'s your complete Kotlin recipe collection!"* 🚀')
          
          with open("APPENDIX.md", "w") as f:
              f.write("\n".join(lines))
          
          print(f"✅ Generated APPENDIX.md with {count} recipes ({intro_count} with intro)")
          PYTHON_EOF
      
      - name: Update README
        run: |
          # Remove old structure section
          sed -i '/<!-- STRUCTURE_START -->/,/<!-- STRUCTURE_END -->/d' README.md
          
          # Insert new structure before "Happy cooking"
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          <!-- STRUCTURE_START -->\
          '"$(cat /tmp/structure.md)"'\
          <!-- STRUCTURE_END -->\
          ' README.md
          
          # Remove old appendix section
          sed -i '/### 📖 Recipe Appendix/,/<!-- APPENDIX_END -->/d' README.md
          
          # Insert appendix before "Happy cooking" (after structure)
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          ### 📖 Recipe Appendix\n\
          \n\
          For a complete list of all recipes with code and introduction links, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚\n\
          \n\
          > 💡 **Tip:** Each recipe includes a direct link to the code file and introduction (if available)!\n\
          \n\
          <!-- APPENDIX_END -->\n\
          ' README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📚 docs: update project structure and recipe appendix [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_author: "KotlinCookBot <41898282+github-actions[bot]@users.noreply.github.com>"
          file_pattern: "README.md APPENDIX.md"
      
      - name: Summary
        run: |
          echo "## 📚 Documentation Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project Structure | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
          echo "| Recipe Appendix | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
          echo "| README | ✅ Updated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 **Statistics:**" >> $GITHUB_STEP_SUMMARY
          echo "- Recipes: $(find src/kotlin/normal -name "*.kt" -type f | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- Categories: $(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d | wc -l)" >> $GITHUB_STEP_SUMMARY
