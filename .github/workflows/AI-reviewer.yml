name: AI Reviewer & Labeler

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Type (issue or pr)'
        required: true
        default: 'issue'
        type: choice
        options:
          - issue
          - pr
      number:
        description: 'Issue/PR number'
        required: true
        type: number
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  ai-review:
    # Tránh vòng lặp vô hạn
    if: |
      (github.event_name == 'issues' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'pull_request' && github.actor != 'github-actions[bot]') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
      
      # Bước 1: Lấy nội dung issue/PR
      - name: Get content
        id: content
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TYPE="${{ inputs.type }}"
            NUMBER="${{ inputs.number }}"
            
            if [ "$TYPE" == "issue" ]; then
              curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$NUMBER" > /tmp/data.json
              TITLE=$(jq -r '.title' /tmp/data.json)
              BODY=$(jq -r '.body' /tmp/data.json | head -c 2000)
            else
              curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/$NUMBER" > /tmp/data.json
              TITLE=$(jq -r '.title' /tmp/data.json)
              BODY=$(jq -r '.body' /tmp/data.json | head -c 2000)
            fi
          elif [ "${{ github.event_name }}" == "issues" ]; then
            TYPE="issue"
            TITLE=$(jq -r '.issue.title' $GITHUB_EVENT_PATH)
            BODY=$(jq -r '.issue.body' $GITHUB_EVENT_PATH | head -c 2000)
            NUMBER=$(jq -r '.issue.number' $GITHUB_EVENT_PATH)
          else
            TYPE="pr"
            TITLE=$(jq -r '.pull_request.title' $GITHUB_EVENT_PATH)
            BODY=$(jq -r '.pull_request.body' $GITHUB_EVENT_PATH | head -c 2000)
            NUMBER=$(jq -r '.pull_request.number' $GITHUB_EVENT_PATH)
          fi
          
          # Lưu vào file
          echo "$TYPE" > /tmp/type.txt
          echo "$NUMBER" > /tmp/number.txt
          
          # Escape cho an toàn
          python3 << 'PYTHON_ESCAPE'
          import json
          
          with open('/tmp/type.txt', 'r') as f:
              typ = f.read().strip()
          
          title = '''$TITLE'''
          body = '''$BODY'''
          
          with open('/tmp/title.txt', 'w') as f:
              f.write(json.dumps(title)[1:-1])  # Bỏ quotes ở 2 đầu
          
          with open('/tmp/body.txt', 'w') as f:
              f.write(json.dumps(body)[1:-1])
          PYTHON_ESCAPE
          
          echo "✅ Content extracted - Type: $TYPE, Number: $NUMBER"
      
      # Bước 2: Gọi Gemini API (có retry)
      - name: Call Gemini API
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TYPE=$(cat /tmp/type.txt)
          
          python3 << 'PYTHON_GEMINI'
          import os, json, subprocess, time
          
          # Đọc dữ liệu
          with open('/tmp/type.txt', 'r') as f:
              typ = f.read().strip()
          
          with open('/tmp/title.txt', 'r') as f:
              title = f.read().strip()
          
          with open('/tmp/body.txt', 'r') as f:
              body = f.read().strip()
          
          # Giới hạn độ dài body
          if len(body) > 2000:
              body = body[:2000] + "..."
          
          # Tạo prompt tùy theo loại
          if typ == "issue":
              prompt = f"""You are KotlinCookBot. Analyze this GitHub issue.
          
  Title: {title}
  Body: {body}
  
  Return ONLY a valid JSON object (no markdown, no extra text):
  {{"label": "bug", "reply": "your helpful reply"}}
  
  Label must be one of: bug, enhancement, question, documentation
  Reply must be helpful, max 100 words."""
          else:
              prompt = f"""You are KotlinCookBot. Review this GitHub Pull Request.
          
  Title: {title}
  Body: {body}
  
  Return ONLY a valid JSON object (no markdown, no extra text):
  {{"status": "APPROVE", "review": "your review comment"}}
  
  Status must be APPROVE or REQUEST_CHANGES
  Review must be constructive, max 100 words."""
          
          # Tạo payload
          payload = {
              "contents": [{
                  "parts": [{"text": prompt}]
              }]
          }
          
          # Retry logic
          max_retries = 3
          response_data = None
          
          for attempt in range(max_retries):
              try:
                  result = subprocess.run([
                      'curl', '-s', '--max-time', '30',
                      '-X', 'POST',
                      f'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key={os.environ["GEMINI_API_KEY"]}',
                      '-H', 'Content-Type: application/json',
                      '-d', json.dumps(payload)
                  ], capture_output=True, text=True)
                  
                  response_data = json.loads(result.stdout)
                  
                  # Kiểm tra response hợp lệ
                  if 'candidates' in response_data and response_data['candidates']:
                      print(f"✅ API success (attempt {attempt + 1})")
                      break
                  else:
                      print(f"⚠️ Invalid response (attempt {attempt + 1})")
                      if attempt < max_retries - 1:
                          time.sleep(2)
                          
              except Exception as e:
                  print(f"❌ Error (attempt {attempt + 1}): {e}")
                  if attempt < max_retries - 1:
                      time.sleep(2)
          
          # Fallback nếu API lỗi
          if not response_data or 'candidates' not in response_data:
              print("⚠️ Using fallback response")
              if typ == "issue":
                  response_data = {
                      "candidates": [{
                          "content": {
                              "parts": [{
                                  "text": '{"label": "question", "reply": "I encountered an API error. Please review this issue manually. Thank you for your contribution!"}'
                              }]
                          }
                      }]
                  }
              else:
                  response_data = {
                      "candidates": [{
                          "content": {
                              "parts": [{
                                  "text": '{"status": "COMMENT", "review": "I encountered an API error. Please review this PR manually. Thank you for your contribution!"}'
                              }]
                          }
                      }]
                  }
          
          # Lưu response
          with open('/tmp/response.json', 'w') as f:
              json.dump(response_data, f)
          
          # Parse và lưu kết quả
          try:
              text = response_data['candidates'][0]['content']['parts'][0]['text']
              # Clean markdown code blocks
              text = text.replace('```json', '').replace('```', '').strip()
              obj = json.loads(text)
              
              if typ == "issue":
                  label = obj.get('label', 'question')
                  reply = obj.get('reply', 'Thanks for your issue!')
                  with open('/tmp/label.txt', 'w') as f:
                      f.write(label)
                  with open('/tmp/reply.txt', 'w') as f:
                      f.write(reply)
                  print(f"✅ Parsed issue - Label: {label}")
              else:
                  status = obj.get('status', 'COMMENT')
                  # Chỉ chấp nhận APPROVE hoặc REQUEST_CHANGES
                  if status not in ['APPROVE', 'REQUEST_CHANGES']:
                      status = 'COMMENT'
                  review = obj.get('review', 'Thanks for your contribution!')
                  with open('/tmp/status.txt', 'w') as f:
                      f.write(status)
                  with open('/tmp/review.txt', 'w') as f:
                      f.write(review)
                  print(f"✅ Parsed PR - Status: {status}")
                  
          except Exception as e:
              print(f"❌ Parse error: {e}")
              if typ == "issue":
                  with open('/tmp/label.txt', 'w') as f:
                      f.write('question')
                  with open('/tmp/reply.txt', 'w') as f:
                      f.write('I had trouble processing your request. A human will review it shortly.')
              else:
                  with open('/tmp/status.txt', 'w') as f:
                      f.write('COMMENT')
                  with open('/tmp/review.txt', 'w') as f:
                      f.write('I had trouble processing this PR. A human reviewer will take a look.')
          PYTHON_GEMINI
      
      # Bước 3: Xử lý Issue (gán label và comment)
      - name: Process Issue
        if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const type = fs.readFileSync('/tmp/type.txt', 'utf8').trim();
            if (type !== 'issue') {
              console.log('Skipping - not an issue');
              return;
            }
            
            const number = parseInt(fs.readFileSync('/tmp/number.txt', 'utf8').trim());
            const label = fs.readFileSync('/tmp/label.txt', 'utf8').trim();
            const reply = fs.readFileSync('/tmp/reply.txt', 'utf8').trim();
            
            console.log(`Processing issue #${number} with label: ${label}`);
            
            // Gán label (không thêm Resolving nữa)
            const validLabels = ['bug', 'enhancement', 'question', 'documentation'];
            if (validLabels.includes(label)) {
              try {
                await github.rest.issues.addLabels({
                  issue_number: number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  labels: [label]
                });
                console.log(`✅ Added label: ${label}`);
              } catch (error) {
                console.log(`⚠️ Could not add label: ${error.message}`);
              }
            }
            
            // Thêm comment
            try {
              await github.rest.issues.createComment({
                issue_number: number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🤖 **KotlinCookBot:**\n\n' + reply + '\n\n---\n*This is an automated response.*'
              });
              console.log('✅ Added comment');
            } catch (error) {
              console.log(`⚠️ Could not add comment: ${error.message}`);
            }
      
      # Bước 4: Xử lý PR (tạo review)
      - name: Process PR
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            const type = fs.readFileSync('/tmp/type.txt', 'utf8').trim();
            if (type !== 'pr') {
              console.log('Skipping - not a PR');
              return;
            }
            
            const number = parseInt(fs.readFileSync('/tmp/number.txt', 'utf8').trim());
            const status = fs.readFileSync('/tmp/status.txt', 'utf8').trim();
            const review = fs.readFileSync('/tmp/review.txt', 'utf8').trim();
            
            console.log(`Processing PR #${number} with status: ${status}`);
            
            // Map status to review event
            let event;
            if (status === 'REQUEST_CHANGES') {
              event = 'REQUEST_CHANGES';
            } else if (status === 'APPROVE') {
              event = 'APPROVE';
            } else {
              event = 'COMMENT';  // Neutral comment, no approval/rejection
            }
            
            try {
              await github.rest.pulls.createReview({
                pull_number: number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🤖 **KotlinCookBot:**\n\n' + review + '\n\n---\n*This is an automated review.*',
                event: event
              });
              console.log(`✅ Created review with event: ${event}`);
            } catch (error) {
              console.log(`⚠️ Could not create review: ${error.message}`);
            }
