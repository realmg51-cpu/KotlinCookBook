name: AI Reviewer & Labeler

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Type (issue or pr)'
        required: true
        default: 'issue'
        type: choice
        options:
          - issue
          - pr
      number:
        description: 'Issue/PR number'
        required: true
        type: number
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get content
        id: content
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TYPE="${{ inputs.type }}"
            NUMBER="${{ inputs.number }}"
            
            if [ "$TYPE" == "issue" ]; then
              curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/issues/$NUMBER" > /tmp/data.json
              TITLE=$(jq -r '.title' /tmp/data.json)
              BODY=$(jq -r '.body' /tmp/data.json | head -c 1500)
            else
              curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/pulls/$NUMBER" > /tmp/data.json
              TITLE=$(jq -r '.title' /tmp/data.json)
              BODY=$(jq -r '.body' /tmp/data.json | head -c 1500)
            fi
          elif [ "${{ github.event_name }}" == "issues" ]; then
            TYPE="issue"
            TITLE=$(jq -r '.issue.title' $GITHUB_EVENT_PATH)
            BODY=$(jq -r '.issue.body' $GITHUB_EVENT_PATH | head -c 1500)
            NUMBER=$(jq -r '.issue.number' $GITHUB_EVENT_PATH)
          else
            TYPE="pr"
            TITLE=$(jq -r '.pull_request.title' $GITHUB_EVENT_PATH)
            BODY=$(jq -r '.pull_request.body' $GITHUB_EVENT_PATH | head -c 1500)
            NUMBER=$(jq -r '.pull_request.number' $GITHUB_EVENT_PATH)
          fi
          
          echo "$TITLE" > /tmp/title.txt
          echo "$BODY" > /tmp/body.txt
          echo "$TYPE" > /tmp/type.txt
          echo "$NUMBER" > /tmp/number.txt
      
      - name: Call Gemini API
        run: |
          TYPE=$(cat /tmp/type.txt)
          TITLE=$(cat /tmp/title.txt)
          BODY=$(cat /tmp/body.txt)
          
          if [ "$TYPE" == "issue" ]; then
            PROMPT="You are KotlinCookBot. Analyze this issue. Return ONLY a JSON object.
            Label: bug, enhancement, question, documentation.
            Reply: helpful, max 100 words, use emoji.
            
            Title: $TITLE
            Body: $BODY
            
            Format: {\"label\": \"...\", \"reply\": \"...\"}"
          else
            PROMPT="You are KotlinCookBot. Review this PR. Return ONLY a JSON object.
            Status: APPROVE or REQUEST_CHANGES.
            Review: max 100 words, use emoji.
            
            Title: $TITLE
            Body: $BODY
            
            Format: {\"status\": \"...\", \"review\": \"...\"}"
          fi
          
          ESCAPED=$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$PROMPT")
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"contents\":[{\"parts\":[{\"text\":$ESCAPED}]}]}")
          
          echo "$RESPONSE" > /tmp/response.json
      
      - name: Parse response
        run: |
          TYPE=$(cat /tmp/type.txt)
          
          if [ "$TYPE" == "issue" ]; then
            python3 << 'PYTHON_EOF'
            import json
            with open('/tmp/response.json') as f:
                data = json.load(f)
            text = data.get('candidates', [{}])[0].get('content', {}).get('parts', [{}])[0].get('text', '{}')
            try:
                obj = json.loads(text)
                label = obj.get('label', 'question')
                reply = obj.get('reply', 'Thanks for your issue!')
            except:
                label = 'question'
                reply = 'Thanks for your issue! A maintainer will review it soon.'
            with open('/tmp/label.txt', 'w') as f:
                f.write(label)
            with open('/tmp/reply.txt', 'w') as f:
                f.write(reply)
            PYTHON_EOF
          else:
            python3 << 'PYTHON_EOF'
            import json
            with open('/tmp/response.json') as f:
                data = json.load(f)
            text = data.get('candidates', [{}])[0].get('content', {}).get('parts', [{}])[0].get('text', '{}')
            try:
                obj = json.loads(text)
                status = obj.get('status', 'APPROVE')
                review = obj.get('review', 'Thanks for your contribution!')
            except:
                status = 'APPROVE'
                review = 'Thanks for your contribution!'
            with open('/tmp/status.txt', 'w') as f:
                f.write(status)
            with open('/tmp/review.txt', 'w') as f:
                f.write(review)
            PYTHON_EOF
      
      - name: Add labels (Issue)
        if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const type = fs.readFileSync('/tmp/type.txt', 'utf8').trim();
            if (type !== 'issue') return;
            
            const label = fs.readFileSync('/tmp/label.txt', 'utf8').trim();
            const number = parseInt(fs.readFileSync('/tmp/number.txt', 'utf8').trim());
            
            const valid = ['bug', 'enhancement', 'question', 'documentation'];
            if (valid.includes(label)) {
              await github.rest.issues.addLabels({
                issue_number: number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: [label, 'Resolving']
              });
            }
      
      - name: Add comment (Issue)
        if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const type = fs.readFileSync('/tmp/type.txt', 'utf8').trim();
            if (type !== 'issue') return;
            
            const reply = fs.readFileSync('/tmp/reply.txt', 'utf8').trim();
            const number = parseInt(fs.readFileSync('/tmp/number.txt', 'utf8').trim());
            
            await github.rest.issues.createComment({
              issue_number: number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **KotlinCookBot:**\n\n' + reply + '\n\n---\n*Auto-generated, please verify*'
            });
      
      - name: Add review (PR)
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const type = fs.readFileSync('/tmp/type.txt', 'utf8').trim();
            if (type !== 'pr') return;
            
            const status = fs.readFileSync('/tmp/status.txt', 'utf8').trim();
            const review = fs.readFileSync('/tmp/review.txt', 'utf8').trim();
            const number = parseInt(fs.readFileSync('/tmp/number.txt', 'utf8').trim());
            
            const event = status === 'REQUEST_CHANGES' ? 'REQUEST_CHANGES' : 'APPROVE';
            
            await github.rest.pulls.createReview({
              pull_number: number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 **KotlinCookBot:**\n\n' + review,
              event: event
            });
