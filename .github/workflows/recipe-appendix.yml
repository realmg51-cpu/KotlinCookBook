name: Update Recipe Appendix

on:
  push:
    paths:
      - 'src/kotlin/normal/**/*.kt'
      - 'src/kotlin/normal/**/introduction.md'
  workflow_dispatch:

jobs:
  update-appendix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Generate APPENDIX.md
        run: |
          python3 << 'PYTHON_EOF'
          import os
          from pathlib import Path
          from datetime import datetime
          
          repo = os.environ.get('GITHUB_REPOSITORY', 'realmg51-cpu/KotlinCookBook')
          
          lines = []
          lines.append("# 📚 KotlinCookBook - Complete Recipe Appendix")
          lines.append("")
          lines.append('> *"All recipes in one place - your complete Kotlin cookbook index!"* 🍳')
          lines.append("")
          lines.append("| Recipe | Code | Introduction |")
          lines.append("|--------|------|--------------|")
          
          # Find all directories with .kt files
          base = Path("src/kotlin/normal")
          count = 0
          
          for kt_file in sorted(base.rglob("*.kt")):
              if "introduction" in str(kt_file).lower():
                  continue
              
              name = kt_file.name
              dir_path = kt_file.parent
              intro_file = dir_path / "introduction.md"
              
              # Code link
              code_url = f"https://github.com/{repo}/blob/main/{kt_file}"
              code_link = f"[🔗 Code]({code_url})"
              
              # Introduction link (if exists)
              if intro_file.exists():
                  intro_url = f"https://github.com/{repo}/blob/main/{intro_file}"
                  intro_link = f"[📖 Intro]({intro_url})"
              else:
                  intro_link = "❌ No intro"
              
              lines.append(f"| `{name}` | {code_link} | {intro_link} |")
              count += 1
          
          lines.append("")
          lines.append("## Statistics")
          lines.append("")
          lines.append("| Metric | Value |")
          lines.append("|--------|-------|")
          lines.append(f"| 🍳 **Total Recipes** | `{count}` |")
          lines.append(f"| 📖 **With Introduction** | `{sum(1 for _ in base.rglob('introduction.md'))}` |")
          lines.append(f"| 🆕 **Last Updated** | {datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC')} |")
          lines.append("")
          lines.append("---")
          lines.append("")
          lines.append('> *"Bookmark this page - it\'s your complete Kotlin recipe collection!"* 🚀')
          
          with open("APPENDIX.md", "w") as f:
              f.write("\n".join(lines))
          
          print(f"✅ Generated APPENDIX.md with {count} recipes")
          PYTHON_EOF
      
      - name: Update README
        run: |
          # Remove old appendix section
          sed -i '/### 📖 Recipe Appendix/,/<!-- APPENDIX_END -->/d' README.md
          
          # Insert before "Happy cooking"
          sed -i '/\*\*Happy cooking! 👨‍🍳🍳\*\*/i\
          ### 📖 Recipe Appendix\n\
          \n\
          For a complete list of all recipes with code and introduction links, check out the [**Full Recipe Appendix**](APPENDIX.md) 📚\n\
          \n\
          > 💡 **Tip:** Each recipe includes a direct link to the code file and introduction (if available)!\n\
          ' README.md
      
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "📚 docs: update recipe appendix with intro links [skip ci]"
          commit_user_name: "KotlinCookBot"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          file_pattern: "README.md APPENDIX.md"
