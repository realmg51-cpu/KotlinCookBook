# .github/workflows/create-release.yml
name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get tag from input or push
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            echo "Using manual tag: $TAG_NAME"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            echo "Using push tag: $TAG_NAME"
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Check if tag exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 Tag $TAG does not exist yet"
          fi
      
      - name: Create tag if not exists
        if: steps.check.outputs.exists == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "KotlinCookBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
      
      - name: Count recipes
        id: stats
        run: |
          NORMAL_RECIPES=$(find src/kotlin/normal -name "*.kt" -type f ! -name "*Test*" 2>/dev/null | wc -l)
          NORMAL_CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          NORMAL_INTROS=$(find src/kotlin/normal -name "introduction.md" -type f 2>/dev/null | wc -l)
          NORMAL_LOC=$(find src/kotlin/normal -name "*.kt" -type f -exec cat {} \; 2>/dev/null | wc -l)
          
          ADVANCED_RECIPES=$(find src/kotlin/advanced -name "*.kt" -type f ! -name "*Test*" 2>/dev/null | wc -l)
          ADVANCED_CATEGORIES=$(find src/kotlin/advanced -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          ADVANCED_INTROS=$(find src/kotlin/advanced -name "introduction.md" -type f 2>/dev/null | wc -l)
          ADVANCED_LOC=$(find src/kotlin/advanced -name "*.kt" -type f -exec cat {} \; 2>/dev/null | wc -l)
          
          TOTAL_RECIPES=$((NORMAL_RECIPES + ADVANCED_RECIPES))
          TOTAL_CATEGORIES=$((NORMAL_CATEGORIES + ADVANCED_CATEGORIES))
          TOTAL_INTROS=$((NORMAL_INTROS + ADVANCED_INTROS))
          TOTAL_LOC=$((NORMAL_LOC + ADVANCED_LOC))
          
          echo "recipes=$TOTAL_RECIPES" >> $GITHUB_OUTPUT
          echo "categories=$TOTAL_CATEGORIES" >> $GITHUB_OUTPUT
          echo "intros=$TOTAL_INTROS" >> $GITHUB_OUTPUT
          echo "loc=$TOTAL_LOC" >> $GITHUB_OUTPUT
          echo "normal_recipes=$NORMAL_RECIPES" >> $GITHUB_OUTPUT
          echo "advanced_recipes=$ADVANCED_RECIPES" >> $GITHUB_OUTPUT
      
      - name: Get previous tag
        id: previous
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l "v*" | grep -v "$CURRENT_TAG" | sort -V | tail -n1 || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git rev-list --count "$PREV_TAG..HEAD")
            echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          else
            echo "commits=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Get commit log and contributors
        run: |
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..HEAD" --format="- %s" > commit_log.txt
            git log "$PREV_TAG..HEAD" --format='%an' | sort -u | sed 's/^/- /' > contributors.txt
          else
            git log --format="- %s" -50 > commit_log.txt
            echo "- @realmg51-cpu" > contributors.txt
          fi
          
          echo "=== commit_log.txt ===" >> debug.log
          cat commit_log.txt >> debug.log
          echo "" >> debug.log
          echo "=== contributors.txt ===" >> debug.log
          cat contributors.txt >> debug.log
      
      - name: Debug - Check API Key
        run: |
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "✅ GEMINI_API_KEY exists"
            echo "API_KEY_LENGTH: ${{ secrets.GEMINI_API_KEY }} | wc -c"
          else
            echo "❌ GEMINI_API_KEY is missing!"
          fi
      
      - name: Generate release notes with Gemini AI
        id: gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NORMAL_RECIPES="${{ steps.stats.outputs.normal_recipes }}"
          ADVANCED_RECIPES="${{ steps.stats.outputs.advanced_recipes }}"
          TOTAL_RECIPES="${{ steps.stats.outputs.recipes }}"
          COROUTINES_VER=$(grep -o "kotlinx-coroutines-bom:[0-9.]*" build.gradle.kts | cut -d: -f2 || echo "1.7.3")
          COMMIT_LOG=$(cat commit_log.txt | head -30)
          CONTRIBUTORS=$(cat contributors.txt | head -10)
          
          echo "=== DEBUG INFO ===" >> debug.log
          echo "VERSION: $VERSION" >> debug.log
          echo "NORMAL_RECIPES: $NORMAL_RECIPES" >> debug.log
          echo "ADVANCED_RECIPES: $ADVANCED_RECIPES" >> debug.log
          echo "COROUTINES_VER: $COROUTINES_VER" >> debug.log
          echo "COMMIT_LOG (first 500 chars): ${COMMIT_LOG:0:500}" >> debug.log
          
          # Create prompt
          cat > prompt.json << 'EOF'
          {
            "contents": [
              {
                "parts": [
                  {
                    "text": "Generate professional release notes for KotlinCookBook vVERSION_PLACEHOLDER. Use this commit log: COMMIT_LOG_PLACEHOLDER. Stats: Normal recipes: NORMAL_PLACEHOLDER, Advanced recipes: ADVANCED_PLACEHOLDER, Total recipes: TOTAL_PLACEHOLDER, Coroutines version: COROUTINES_PLACEHOLDER (using BOM). Contributors: CONTRIBUTORS_PLACEHOLDER. Format requirements: 1. Start with '# 🍳 KotlinCookBook vVERSION_PLACEHOLDER' 2. Add a fun cooking quote 3. Create '## 📊 Statistics' table with metrics 4. Create '## 🆕 What's New' with categories: 🚀 Features, 🐛 Bug Fixes, 📦 Dependencies 5. Add '## 👥 Contributors' section 6. Add '## 🚀 How to Use' section with code examples 7. Emphasize that Coroutines now uses BOM (Bill of Materials) approach upgraded to COROUTINES_PLACEHOLDER 8. Keep it concise but informative 9. End with '**Happy cooking!** 👨‍🍳🚀'"
                  }
                ]
              }
            ]
          }
          EOF
          
          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" prompt.json
          sed -i "s/NORMAL_PLACEHOLDER/$NORMAL_RECIPES/g" prompt.json
          sed -i "s/ADVANCED_PLACEHOLDER/$ADVANCED_RECIPES/g" prompt.json
          sed -i "s/TOTAL_PLACEHOLDER/$TOTAL_RECIPES/g" prompt.json
          sed -i "s/COROUTINES_PLACEHOLDER/$COROUTINES_VER/g" prompt.json
          
          # Escape special characters for sed
          COMMIT_LOG_ESCAPED=$(echo "$COMMIT_LOG" | sed 's/[&/\]/\\&/g' | sed 's/"/\\"/g')
          CONTRIBUTORS_ESCAPED=$(echo "$CONTRIBUTORS" | sed 's/[&/\]/\\&/g' | sed 's/"/\\"/g')
          
          sed -i "s/COMMIT_LOG_PLACEHOLDER/$COMMIT_LOG_ESCAPED/g" prompt.json
          sed -i "s/CONTRIBUTORS_PLACEHOLDER/$CONTRIBUTORS_ESCAPED/g" prompt.json
          
          echo "=== PROMPT (first 1000 chars) ===" >> debug.log
          cat prompt.json | head -c 1000 >> debug.log
          
          # Test API connectivity
          echo "Testing API connectivity..." >> debug.log
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" "https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}" >> debug.log
          
          # Call Gemini API
          echo "Calling Gemini API..." >> debug.log
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @prompt.json)
          
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP_STATUS: $HTTP_STATUS" >> debug.log
          echo "RESPONSE_BODY: $RESPONSE_BODY" >> debug.log
          
          # Save response for debugging
          echo "$RESPONSE_BODY" > gemini_response.json
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "$RESPONSE_BODY" | jq -r '.candidates[0].content.parts[0].text' > release_notes.md 2>/dev/null
            if [ -s release_notes.md ]; then
              echo "✅ Gemini AI generated release notes" >> debug.log
              echo "success=true" >> $GITHUB_OUTPUT
            else
              echo "⚠️ Empty response from Gemini" >> debug.log
              echo "$RESPONSE_BODY" | jq '.' >> debug.log
              echo "success=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ Gemini API error: $HTTP_STATUS" >> debug.log
            echo "$RESPONSE_BODY" >> debug.log
            echo "success=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: |
            debug.log
            prompt.json
            gemini_response.json
            commit_log.txt
            contributors.txt
      
      - name: Fallback manual release notes
        if: steps.gemini.outputs.success == 'false'
        run: |
          echo "Using fallback manual release notes..." >> debug.log
          
          VERSION="${{ steps.version.outputs.version }}"
          NORMAL_RECIPES="${{ steps.stats.outputs.normal_recipes }}"
          ADVANCED_RECIPES="${{ steps.stats.outputs.advanced_recipes }}"
          TOTAL_RECIPES="${{ steps.stats.outputs.recipes }}"
          TOTAL_CATEGORIES="${{ steps.stats.outputs.categories }}"
          TOTAL_LOC="${{ steps.stats.outputs.loc }}"
          COROUTINES_VER=$(grep -o "kotlinx-coroutines-bom:[0-9.]*" build.gradle.kts | cut -d: -f2 || echo "1.7.3")
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          COMMITS="${{ steps.previous.outputs.commits }}"
          
          echo "# 🍳 KotlinCookBook v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "> *\"Another batch of delicious Kotlin recipes is ready!\"*" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 📊 Statistics" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Metric | Value |" >> release_notes.md
          echo "|--------|-------|" >> release_notes.md
          echo "| 🍜 Normal Recipes | ${NORMAL_RECIPES} |" >> release_notes.md
          echo "| 🚀 Advanced Recipes | ${ADVANCED_RECIPES} |" >> release_notes.md
          echo "| 🍽️ Total Recipes | ${TOTAL_RECIPES} |" >> release_notes.md
          echo "| 📁 Categories | ${TOTAL_CATEGORIES} |" >> release_notes.md
          echo "| 📝 Lines of Code | ${TOTAL_LOC} |" >> release_notes.md
          echo "| 🔄 Coroutines | ${COROUTINES_VER} (via BOM) |" >> release_notes.md
          echo "| 🚀 Commits since last release | ${COMMITS} |" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 🆕 What's New" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Dependency Updates" >> release_notes.md
          echo "- **Kotlin Coroutines**: Migrated to BOM (Bill of Materials) approach" >> release_notes.md
          echo "- Version upgraded: \`${COROUTINES_VER}\`" >> release_notes.md
          echo "- Using: \`implementation(platform(\"org.jetbrains.kotlinx:kotlinx-coroutines-bom:${COROUTINES_VER}\"))\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Changes in this Release" >> release_notes.md
          echo "" >> release_notes.md
          cat commit_log.txt | head -20 >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 👥 Contributors" >> release_notes.md
          echo "" >> release_notes.md
          cat contributors.txt >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "## 🚀 How to Use This Release" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "git clone https://github.com/${{ github.repository }}.git" >> release_notes.md
          echo "cd KotlinCookBook" >> release_notes.md
          echo "./gradlew build" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "**Happy cooking!** 👨‍🍳🚀" >> release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          name: "🍳 ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Print success message
        run: |
          echo "✅ Release created: ${{ steps.version.outputs.tag }}"
          echo "📊 Normal recipes: ${{ steps.stats.outputs.normal_recipes }}"
          echo "📊 Advanced recipes: ${{ steps.stats.outputs.advanced_recipes }}"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
          echo ""
          echo "📁 Debug logs uploaded as artifact: debug-logs"
