name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get tag from input or push
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            echo "Using manual tag: $TAG_NAME"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            echo "Using push tag: $TAG_NAME"
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Check if tag exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 Tag $TAG does not exist yet"
          fi
      
      - name: Create tag if not exists
        if: steps.check.outputs.exists == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "KotlinCookBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
      
      - name: Count recipes, categories, intros, lines of code
        id: stats
        run: |
          RECIPES=$(find src/kotlin/normal -name "*.kt" -type f ! -name "*Test*" 2>/dev/null | wc -l)
          CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          INTROS=$(find src/kotlin/normal -name "introduction.md" -type f 2>/dev/null | wc -l)
          LOC=$(find src/kotlin/normal -name "*.kt" -type f -exec cat {} \; 2>/dev/null | wc -l)
          
          echo "recipes=$RECIPES" >> $GITHUB_OUTPUT
          echo "categories=$CATEGORIES" >> $GITHUB_OUTPUT
          echo "intros=$INTROS" >> $GITHUB_OUTPUT
          echo "loc=$LOC" >> $GITHUB_OUTPUT
      
      - name: Get previous tag
        id: previous
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l "v*" | grep -v "$CURRENT_TAG" | sort -V | tail -n1 || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git rev-list --count "$PREV_TAG..HEAD")
            echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          else
            echo "commits=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Get contributors since last release
        id: contributors
        run: |
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          
          if [ -n "$PREV_TAG" ]; then
            CONTRIBUTORS=$(git log "$PREV_TAG..HEAD" --format='%an' | sort -u | sed 's/^/- /' | head -20)
          else
            CONTRIBUTORS="- @realmg51-cpu"
          fi
          
          echo "$CONTRIBUTORS" > contributors.txt
      
      - name: Get latest recipes added
        id: latest_recipes
        run: |
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          
          if [ -n "$PREV_TAG" ]; then
            LATEST_RECIPES=$(git diff --diff-filter=A --name-only "$PREV_TAG..HEAD" -- "src/kotlin/normal/*.kt" 2>/dev/null | head -10)
          else
            LATEST_RECIPES=""
          fi
          
          if [ -n "$LATEST_RECIPES" ]; then
            echo "recipes=$LATEST_RECIPES" >> $GITHUB_OUTPUT
          else
            echo "recipes=No new recipes in this release" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate release notes
        run: |
          VERSION_NUM="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          
          # Create empty file
          > release_notes.md
          
          # Header
          echo "🍳 v$VERSION_NUM" >> release_notes.md
          echo "" >> release_notes.md
          echo "🍳 KotlinCookBook v$VERSION_NUM" >> release_notes.md
          echo "" >> release_notes.md
          echo "> *\"Another batch of delicious Kotlin recipes is ready!\"*" >> release_notes.md
          echo "" >> release_notes.md
          
          # Statistics
          echo "### 📊 Statistics" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Metric | Value |" >> release_notes.md
          echo "|--------|-------|" >> release_notes.md
          echo "| 🍽️ **Total Recipes** | **${{ steps.stats.outputs.recipes }}** |" >> release_notes.md
          echo "| 📁 **Categories** | ${{ steps.stats.outputs.categories }} |" >> release_notes.md
          echo "| 📖 **Introductions** | ${{ steps.stats.outputs.intros }} |" >> release_notes.md
          echo "| 📝 **Lines of Code** | ${{ steps.stats.outputs.loc }} |" >> release_notes.md
          echo "| 🚀 **Commits since last release** | ${{ steps.previous.outputs.commits }} |" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # What's New
          echo "### 🆕 What's New" >> release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "#### Changes from $PREV_TAG to $CURRENT_TAG:" >> release_notes.md
            echo "" >> release_notes.md
            git log --oneline --pretty="- %s" "$PREV_TAG..HEAD" >> release_notes.md
          else
            echo "#### Initial release! 🎉" >> release_notes.md
            echo "" >> release_notes.md
            git log --oneline --pretty="- %s" -20 >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Contributors
          echo "### 👥 Contributors in this Release" >> release_notes.md
          echo "" >> release_notes.md
          cat contributors.txt >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Latest Recipes
          echo "### 🍳 Latest Recipes Added" >> release_notes.md
          echo "" >> release_notes.md
          echo "${{ steps.latest_recipes.outputs.recipes }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # How to Use (static text, no command execution)
          echo "### 🚀 How to Use This Release" >> release_notes.md
          echo "" >> release_notes.md
          echo "#### Option 1: Clone and run locally" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "git clone https://github.com/realmg51-cpu/KotlinCookBook.git" >> release_notes.md
          echo "cd KotlinCookBook" >> release_notes.md
          echo "kotlin src/kotlin/normal/GettingStarted/HelloWorld.kt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "#### Option 2: Run with Docker" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull ghcr.io/realmg51-cpu/kotlincookbook:latest" >> release_notes.md
          echo "docker run --rm -it ghcr.io/realmg51-cpu/kotlincookbook:latest \\" >> release_notes.md
          echo "  kotlin src/kotlin/normal/GettingStarted/HelloWorld.kt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Full Recipe List
          echo "### 📚 Full Recipe List" >> release_notes.md
          echo "" >> release_notes.md
          echo "Check out the [README](https://github.com/realmg51-cpu/KotlinCookBook) for the complete recipe index!" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Thank You
          echo "### 🙏 Thank You!" >> release_notes.md
          echo "" >> release_notes.md
          echo "Special thanks to all contributors who made this release possible!" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Maintained by
          echo "### 🤖 Maintained by KotlinCookBot" >> release_notes.md
          echo "" >> release_notes.md
          echo "*\"Good code is like good food – best when shared!\"* 🍳" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Footer
          echo "**Happy cooking!** 👨‍🍳🚀" >> release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          name: "🍳 ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Summary
        run: |
          echo "## 🚀 Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Recipes** | ${{ steps.stats.outputs.recipes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Categories** | ${{ steps.stats.outputs.categories }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Introductions** | ${{ steps.stats.outputs.intros }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lines of Code** | ${{ steps.stats.outputs.loc }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
