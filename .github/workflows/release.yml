name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Get tag from input or push
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            echo "Using manual tag: $TAG_NAME"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            echo "Using push tag: $TAG_NAME"
          fi
          
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
      
      - name: Check if tag exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "📝 Tag $TAG does not exist yet"
          fi
      
      - name: Create tag if not exists
        if: steps.check.outputs.exists == 'false' && github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "KotlinCookBot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"
          echo "✅ Created and pushed tag: $TAG"
      
      - name: Count recipes (include both normal and advanced)
        id: stats
        run: |
          # Normal recipes
          NORMAL_RECIPES=$(find src/kotlin/normal -name "*.kt" -type f ! -name "*Test*" 2>/dev/null | wc -l)
          NORMAL_CATEGORIES=$(find src/kotlin/normal -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          NORMAL_INTROS=$(find src/kotlin/normal -name "introduction.md" -type f 2>/dev/null | wc -l)
          NORMAL_LOC=$(find src/kotlin/normal -name "*.kt" -type f -exec cat {} \; 2>/dev/null | wc -l)
          
          # Advanced recipes (coroutines, etc.)
          ADVANCED_RECIPES=$(find src/kotlin/advanced -name "*.kt" -type f ! -name "*Test*" 2>/dev/null | wc -l)
          ADVANCED_CATEGORIES=$(find src/kotlin/advanced -mindepth 1 -maxdepth 1 -type d 2>/dev/null | wc -l)
          ADVANCED_INTROS=$(find src/kotlin/advanced -name "introduction.md" -type f 2>/dev/null | wc -l)
          ADVANCED_LOC=$(find src/kotlin/advanced -name "*.kt" -type f -exec cat {} \; 2>/dev/null | wc -l)
          
          # Total
          TOTAL_RECIPES=$((NORMAL_RECIPES + ADVANCED_RECIPES))
          TOTAL_CATEGORIES=$((NORMAL_CATEGORIES + ADVANCED_CATEGORIES))
          TOTAL_INTROS=$((NORMAL_INTROS + ADVANCED_INTROS))
          TOTAL_LOC=$((NORMAL_LOC + ADVANCED_LOC))
          
          echo "recipes=$TOTAL_RECIPES" >> $GITHUB_OUTPUT
          echo "categories=$TOTAL_CATEGORIES" >> $GITHUB_OUTPUT
          echo "intros=$TOTAL_INTROS" >> $GITHUB_OUTPUT
          echo "loc=$TOTAL_LOC" >> $GITHUB_OUTPUT
          
          echo "normal_recipes=$NORMAL_RECIPES" >> $GITHUB_OUTPUT
          echo "advanced_recipes=$ADVANCED_RECIPES" >> $GITHUB_OUTPUT
      
      - name: Get previous tag
        id: previous
        run: |
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG=$(git tag -l "v*" | grep -v "$CURRENT_TAG" | sort -V | tail -n1 || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git rev-list --count "$PREV_TAG..HEAD")
            echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          else
            echo "commits=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Get contributors since last release
        run: |
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG..HEAD" --format='%an' | sort -u | sed 's/^/- /' | head -20 > contributors.txt
          else
            echo "- @realmg51-cpu" > contributors.txt
          fi
      
      - name: Generate release notes
        run: |
          VERSION_NUM="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.previous.outputs.tag }}"
          CURRENT_TAG="${{ steps.version.outputs.tag }}"
          RECIPES="${{ steps.stats.outputs.recipes }}"
          CATEGORIES="${{ steps.stats.outputs.categories }}"
          INTROS="${{ steps.stats.outputs.intros }}"
          LOC="${{ steps.stats.outputs.loc }}"
          COMMITS="${{ steps.previous.outputs.commits }}"
          NORMAL_RECIPES="${{ steps.stats.outputs.normal_recipes }}"
          ADVANCED_RECIPES="${{ steps.stats.outputs.advanced_recipes }}"
          
          # Header
          echo "# 🍳 KotlinCookBook v${VERSION_NUM}" > release_notes.md
          echo "" >> release_notes.md
          echo "> *\"Another batch of delicious Kotlin recipes is ready!\"*" >> release_notes.md
          echo "" >> release_notes.md
          
          # Statistics
          echo "## 📊 Statistics" >> release_notes.md
          echo "" >> release_notes.md
          echo "| Metric | Value |" >> release_notes.md
          echo "|--------|-------|" >> release_notes.md
          echo "| 🍜 **Normal Recipes** | **${NORMAL_RECIPES}** |" >> release_notes.md
          echo "| 🚀 **Advanced Recipes** | **${ADVANCED_RECIPES}** |" >> release_notes.md
          echo "| 🍽️ **Total Recipes** | **${RECIPES}** |" >> release_notes.md
          echo "| 📁 **Categories** | ${CATEGORIES} |" >> release_notes.md
          echo "| 📖 **Introductions** | ${INTROS} |" >> release_notes.md
          echo "| 📝 **Lines of Code** | ${LOC} |" >> release_notes.md
          echo "| 🚀 **Commits since last release** | ${COMMITS} |" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # What's New
          echo "## 🆕 What's New" >> release_notes.md
          echo "" >> release_notes.md
          
          if [ -n "$PREV_TAG" ]; then
            echo "#### Changes from ${PREV_TAG} to ${CURRENT_TAG}:" >> release_notes.md
            echo "" >> release_notes.md
            git log --oneline --pretty="- %s" "${PREV_TAG}..HEAD" >> release_notes.md
          else
            echo "#### Initial release! 🎉" >> release_notes.md
            echo "" >> release_notes.md
            git log --oneline --pretty="- %s" -20 >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Contributors
          echo "## 👥 Contributors in this Release" >> release_notes.md
          echo "" >> release_notes.md
          cat contributors.txt >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Recipe Categories
          echo "## 📚 Recipe Categories" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🍜 Normal (Beginner → Intermediate)" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          ls src/kotlin/normal/ 2>/dev/null | head -20 >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Advanced" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          ls src/kotlin/advanced/ 2>/dev/null | head -10 >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # How to Use
          echo "## 🚀 How to Use This Release" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Option 1: Clone and run locally" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "git clone https://github.com/realmg51-cpu/KotlinCookBook.git" >> release_notes.md
          echo "cd KotlinCookBook" >> release_notes.md
          echo "kotlin src/kotlin/normal/GettingStarted/HelloWorld.kt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Option 2: Run with Docker" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker pull ghcr.io/realmg51-cpu/kotlincookbook:latest" >> release_notes.md
          echo "docker run --rm -it ghcr.io/realmg51-cpu/kotlincookbook:latest \\" >> release_notes.md
          echo "  kotlin src/kotlin/normal/GettingStarted/HelloWorld.kt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "### Option 3: Run coroutines (advanced)" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "kotlin -cp kotlinx-coroutines-core-1.7.3.jar src/kotlin/advanced/Coroutines/Coroutines.kt" >> release_notes.md
          echo '```' >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          
          # Footer
          echo "## 🙏 Thank You!" >> release_notes.md
          echo "" >> release_notes.md
          echo "Special thanks to all contributors who made this release possible!" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          echo "**Happy cooking!** 👨‍🍳🚀" >> release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release_notes.md
          name: "🍳 ${{ steps.version.outputs.tag }}"
          tag_name: ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Print success message
        run: |
          echo "✅ Release created: ${{ steps.version.outputs.tag }}"
          echo "📊 Normal: ${{ steps.stats.outputs.normal_recipes }} recipes"
          echo "📊 Advanced: ${{ steps.stats.outputs.advanced_recipes }} recipes"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
