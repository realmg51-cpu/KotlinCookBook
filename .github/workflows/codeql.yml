name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '27 12 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: java-kotlin
          build-mode: manual  # ← Đổi từ autobuild thành manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-and-quality  # Thêm quét nâng cao

    - name: Manual build (Kotlin)
      if: matrix.build-mode == 'manual'
      shell: bash
      run: |
        echo '🏗️ Building Kotlin files for CodeQL analysis...'
        echo 'Project structure: Simple .kt files (no build system)'
        echo 'CodeQL will analyze the source code directly.'
        echo '✅ Manual build completed (no compilation needed for scanning)'

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
