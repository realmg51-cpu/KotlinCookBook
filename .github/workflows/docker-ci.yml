name: Docker Build, Test & Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test all recipes in Docker container
        run: |
          echo "🍳 Testing all recipes with Docker..."
          echo "===================================="
          
          failed=0
          total=0
          
          # Get image name
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}"
          else
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          fi
          
          # Debug: Show what's in the container
          echo "📁 Container structure:"
          docker run --rm "$IMAGE" ls -la /app/src/kotlin/normal/ 2>/dev/null | head -20 || echo "  No files found in /app/src/kotlin/normal/"
          
          # Find all Kotlin files (correct path is /app/src/)
          while IFS= read -r recipe; do
            total=$((total + 1))
            name=$(basename "$recipe")
            echo -n "Testing $name... "
            
            if docker run --rm "$IMAGE" kotlinc -script "$recipe" > /tmp/test_output.txt 2>&1; then
              echo "✅ PASS"
            else
              echo "❌ FAIL"
              failed=$((failed + 1))
              # Show error for debugging
              echo "  Error from $name:"
              cat /tmp/test_output.txt | head -5
            fi
          done < <(docker run --rm "$IMAGE" find /app/src -name "*.kt" -type f 2>/dev/null | sort)
          
          echo "===================================="
          echo "📊 Results: $((total - failed))/$total passed"
          
          if [ $failed -eq 0 ] && [ $total -gt 0 ]; then
            echo "🎉 All $total recipes passed!"
            exit 0
          elif [ $total -eq 0 ]; then
            echo "⚠️ No Kotlin files found in /app/src/"
            echo "📂 Available paths:"
            docker run --rm "$IMAGE" find /app -type d 2>/dev/null | head -10
            exit 0
          else
            echo "💥 $failed recipe(s) failed!"
            exit 1
          fi
        if: github.event_name != 'pull_request'
      
      - name: Test (PR only - no push)
        run: |
          echo "🍳 Testing recipes in PR (using local build)..."
          echo "===================================="
          
          # Build locally for testing
          docker build -t kotlincookbook-test .
          
          failed=0
          total=0
          
          # Debug: Show structure
          echo "📁 Container structure:"
          docker run --rm kotlincookbook-test ls -la /app/src/kotlin/normal/ 2>/dev/null | head -20 || echo "  No files found"
          
          # Find all Kotlin files (correct path is /app/src/)
          while IFS= read -r recipe; do
            total=$((total + 1))
            name=$(basename "$recipe")
            echo -n "Testing $name... "
            
            if docker run --rm kotlincookbook-test kotlinc -script "$recipe" > /tmp/test_output.txt 2>&1; then
              echo "✅ PASS"
            else
              echo "❌ FAIL"
              failed=$((failed + 1))
              # Show error for debugging
              echo "  Error from $name:"
              cat /tmp/test_output.txt | head -5
            fi
          done < <(docker run --rm kotlincookbook-test find /app/src -name "*.kt" -type f 2>/dev/null | sort)
          
          echo "===================================="
          echo "📊 Results: $((total - failed))/$total passed"
          
          if [ $failed -eq 0 ] && [ $total -gt 0 ]; then
            echo "🎉 All $total recipes passed!"
            exit 0
          elif [ $total -eq 0 ]; then
            echo "⚠️ No Kotlin files found in /app/src/"
            echo "📂 Available paths:"
            docker run --rm kotlincookbook-test find /app -type d 2>/dev/null | head -10
            exit 0
          else
            echo "💥 $failed recipe(s) failed!"
            exit 1
          fi
        if: github.event_name == 'pull_request'
      
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      
      - name: Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | \`${{ steps.meta.outputs.tags }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Pull the image" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🍳 Run a recipe" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \\" >> $GITHUB_STEP_SUMMARY
          echo "  kotlin -script /app/src/kotlin/normal/GettingStarted/HelloWorld.kt" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
