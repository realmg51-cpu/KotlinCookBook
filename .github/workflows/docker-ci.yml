# .github/workflows/docker-test.yml
name: Docker Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t kotlincookbook .
      
      - name: Test all recipes in Docker
        run: |
          for recipe in src/kotlin/normal/*.kt; do
            echo "Testing $(basename $recipe)..."
            docker run --rm kotlincookbook kotlin "$recipe"
          done
      
      - name: Push to Docker Hub (on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker tag kotlincookbook ${{ secrets.DOCKER_USERNAME }}/kotlincookbook:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/kotlincookbook:latest
