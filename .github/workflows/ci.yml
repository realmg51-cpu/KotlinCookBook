name: 🧪 Test Kotlin Kitchen

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_coroutines:
        description: 'Test coroutines (advanced)'
        required: false
        default: false
        type: boolean
      skip_normal:
        description: 'Skip normal tests'
        required: false
        default: false
        type: boolean

env:
  KOTLIN_VERSION: 2.3.20

jobs:
  test:
    name: 🧪 Test Recipes
    runs-on: ubuntu-latest
    
    steps:
      - name: 🍴 Checkout code
        uses: actions/checkout@v6
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 💾 Cache Kotlin compiler
        id: cache-kotlin
        uses: actions/cache@v5
        with:
          path: ~/kotlinc
          key: ${{ runner.os }}-kotlin-${{ env.KOTLIN_VERSION }}
          restore-keys: |
            ${{ runner.os }}-kotlin-
      
      - name: 🏗️ Install Kotlin (cached)
        if: steps.cache-kotlin.outputs.cache-hit != 'true'
        run: |
          echo "📦 Downloading Kotlin ${{ env.KOTLIN_VERSION }}..."
          wget -q https://github.com/JetBrains/kotlin/releases/download/v${{ env.KOTLIN_VERSION }}/kotlin-compiler-${{ env.KOTLIN_VERSION }}.zip
          unzip -q -o kotlin-compiler-${{ env.KOTLIN_VERSION }}.zip -d ~/
          rm kotlin-compiler-${{ env.KOTLIN_VERSION }}.zip
          echo "✅ Kotlin installed!"
      
      - name: 🔗 Add Kotlin to PATH
        run: echo "$HOME/kotlinc/bin" >> $GITHUB_PATH
      
      - name: ✅ Verify Kotlin installation
        run: |
          kotlinc -version
          echo "🎉 Kotlin is ready!"
      
      - name: 🧪 Test normal recipes (compile + run JAR)
        if: ${{ !github.event.inputs.skip_normal || github.event.inputs.skip_normal == 'false' }}
        run: |
          # Create temp and output directories
          mkdir -p temp test-outputs
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🧪 TESTING NORMAL RECIPES"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          FAILED=0
          TOTAL=0
          FAILED_LIST=""
          
          # Create summary file
          SUMMARY_FILE="test-outputs/SUMMARY.md"
          echo "# 🧪 Kotlin CookBook Test Results" > $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "**Run Date:** $(date)" >> $SUMMARY_FILE
          echo "**Kotlin Version:** ${{ env.KOTLIN_VERSION }}" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "## Results" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          
          # Find all normal Kotlin files with main function (exclude advanced)
          while IFS= read -r file; do
            TOTAL=$((TOTAL + 1))
            filename=$(basename "$file" .kt)
            safename=$(echo "$file" | sed 's|/|_|g' | sed 's|src_||')
            output_file="test-outputs/${safename}.txt"
            compile_error="test-outputs/${safename}.compile_error.txt"
            jar_file="temp/${filename}.jar"
            
            echo "🔪 Testing: $file"
            
            # Compile to JAR
            if kotlinc "$file" -include-runtime -d "$jar_file" 2> "$compile_error"; then
              # Run JAR
              if java -jar "$jar_file" > "$output_file" 2>&1; then
                echo "   ✅ PASSED"
                echo "- ✅ **PASSED** | $file" >> $SUMMARY_FILE
                echo "  <details><summary>📜 Output</summary>" >> $SUMMARY_FILE
                echo '  ```' >> $SUMMARY_FILE
                head -15 "$output_file" >> $SUMMARY_FILE
                if [ $(wc -l < "$output_file") -gt 15 ]; then
                  echo "  ... (full log in artifact)" >> $SUMMARY_FILE
                fi
                echo '  ```' >> $SUMMARY_FILE
                echo "  </details>" >> $SUMMARY_FILE
              else
                echo "   ❌ FAILED (runtime error)"
                FAILED=$((FAILED + 1))
                FAILED_LIST="$FAILED_LIST\n   ❌ $file"
                echo "- ❌ **FAILED** | $file (runtime error)" >> $SUMMARY_FILE
                echo "  <details><summary>📜 Runtime Error</summary>" >> $SUMMARY_FILE
                echo '  ```' >> $SUMMARY_FILE
                cat "$output_file" | head -30 >> $SUMMARY_FILE
                echo '  ```' >> $SUMMARY_FILE
                echo "  </details>" >> $SUMMARY_FILE
              fi
            else
              echo "   ❌ FAILED (compilation error)"
              FAILED=$((FAILED + 1))
              FAILED_LIST="$FAILED_LIST\n   ❌ $file"
              echo "- ❌ **FAILED** | $file (compilation error)" >> $SUMMARY_FILE
              echo "  <details><summary>📜 Compilation Error</summary>" >> $SUMMARY_FILE
              echo '  ```' >> $SUMMARY_FILE
              cat "$compile_error" | head -30 >> $SUMMARY_FILE
              echo '  ```' >> $SUMMARY_FILE
              echo "  </details>" >> $SUMMARY_FILE
            fi
            
            # Cleanup JAR file
            rm -f "$jar_file"
            echo "" >> $SUMMARY_FILE
            echo ""
            
          done < <(find src/kotlin/normal -name "*.kt" -type f -exec grep -l "fun main" {} \; 2>/dev/null | sort)
          
          echo "## Normal Recipes Summary" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          echo "| Metric | Value |" >> $SUMMARY_FILE
          echo "|--------|-------|" >> $SUMMARY_FILE
          echo "| Total Normal Recipes | $TOTAL |" >> $SUMMARY_FILE
          echo "| ✅ Passed | $((TOTAL - FAILED)) |" >> $SUMMARY_FILE
          echo "| ❌ Failed | $FAILED |" >> $SUMMARY_FILE
          echo "" >> $SUMMARY_FILE
          
          if [ $FAILED -gt 0 ]; then
            echo "⚠️ **$FAILED normal recipe(s) failed!**" >> $SUMMARY_FILE
            echo "❌ Failed normal recipes:" >> $SUMMARY_FILE
            echo -e "$FAILED_LIST" >> $SUMMARY_FILE
          fi
          
          # Print final results
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 NORMAL RECIPES RESULTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Total normal recipes: $TOTAL"
          echo "✅ Passed: $((TOTAL - FAILED))"
          echo "❌ Failed: $FAILED"
          echo ""
          
          # Save results for later
          echo "NORMAL_FAILED=$FAILED" >> $GITHUB_ENV
          echo "NORMAL_TOTAL=$TOTAL" >> $GITHUB_ENV
      
      - name: 🚀 Test coroutines with Gradle
        if: ${{ github.event.inputs.test_coroutines == 'true' || github.event_name == 'push' }}
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 TESTING COROUTINES (ADVANCED) WITH GRADLE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          
          # Create a temporary Gradle project for coroutines
          mkdir -p coroutines_test
          cd coroutines_test
          
          # Create build.gradle.kts
          cat > build.gradle.kts << 'EOF'
          plugins {
              kotlin("jvm") version "2.3.20"
              application
          }
          
          repositories {
              mavenCentral()
          }
          
          dependencies {
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3")
          }
          
          application {
              mainClass.set("CoroutinesKt")
          }
          
          tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile> {
              kotlinOptions.jvmTarget = "17"
          }
          EOF
          
          # Copy coroutines file
          mkdir -p src/main/kotlin
          cp ../src/kotlin/advanced/Coroutines/Coroutines.kt src/main/kotlin/
          
          # Create wrapper
          gradle wrapper --gradle-version 8.5
          
          # Make gradlew executable
          chmod +x gradlew
          
          # Run the coroutines
          echo "📦 Building and running coroutines with Gradle..."
          
          if ./gradlew run --no-daemon > ../test-outputs/coroutines_output.txt 2>&1; then
            echo "   ✅ COROUTINES PASSED"
            echo "## Coroutines Test" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            echo "✅ **Coroutines passed!**" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            echo "<details><summary>📜 Output</summary>" >> ../test-outputs/SUMMARY.md
            echo '```' >> ../test-outputs/SUMMARY.md
            head -30 ../test-outputs/coroutines_output.txt >> ../test-outputs/SUMMARY.md
            echo '```' >> ../test-outputs/SUMMARY.md
            echo "</details>" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            COROUTINES_STATUS="passed"
          else
            echo "   ❌ COROUTINES FAILED"
            echo "## Coroutines Test" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            echo "❌ **Coroutines failed!**" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            echo "<details><summary>📜 Error Output</summary>" >> ../test-outputs/SUMMARY.md
            echo '```' >> ../test-outputs/SUMMARY.md
            cat ../test-outputs/coroutines_output.txt >> ../test-outputs/SUMMARY.md
            echo '```' >> ../test-outputs/SUMMARY.md
            echo "</details>" >> ../test-outputs/SUMMARY.md
            echo "" >> ../test-outputs/SUMMARY.md
            COROUTINES_STATUS="failed"
          fi
          
          cd ..
          
          echo "COROUTINES_STATUS=$COROUTINES_STATUS" >> $GITHUB_ENV
      
      - name: 📊 Final Summary
        run: |
          echo "" >> test-outputs/SUMMARY.md
          echo "## Final Summary" >> test-outputs/SUMMARY.md
          echo "" >> test-outputs/SUMMARY.md
          echo "| Test Suite | Status |" >> test-outputs/SUMMARY.md
          echo "|------------|--------|" >> test-outputs/SUMMARY.md
          echo "| Normal Recipes | $((NORMAL_TOTAL - NORMAL_FAILED))/$NORMAL_TOTAL passed |" >> test-outputs/SUMMARY.md
          echo "| Coroutines (Advanced) | $COROUTINES_STATUS |" >> test-outputs/SUMMARY.md
          echo "" >> test-outputs/SUMMARY.md
          
          if [ "$COROUTINES_STATUS" == "failed" ] || [ $NORMAL_FAILED -gt 0 ]; then
            echo "⚠️ **Some tests failed!**" >> test-outputs/SUMMARY.md
            exit 1
          else
            echo "🎉 **All tests passed! Bon appétit!** 🎉" >> test-outputs/SUMMARY.md
            exit 0
          fi
      
      - name: 📊 Upload test outputs as artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kotlin-test-outputs
          path: test-outputs/
          retention-days: 30
