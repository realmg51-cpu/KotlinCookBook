name: 🧪 Test Kotlin Kitchen

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-all-recipes:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🍴 Checkout code
        uses: actions/checkout@v4
      
      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 💾 Cache Kotlin compiler
        id: cache-kotlin
        uses: actions/cache@v4
        with:
          path: ~/kotlinc
          key: ${{ runner.os }}-kotlin-2.0.20
          restore-keys: |
            ${{ runner.os }}-kotlin-
      
      - name: 🏗️ Install Kotlin (cached)
        if: steps.cache-kotlin.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/JetBrains/kotlin/releases/download/v2.0.20/kotlin-compiler-2.0.20.zip
          unzip -q kotlin-compiler-2.0.20.zip -d ~/
          rm kotlin-compiler-2.0.20.zip
      
      - name: 🔗 Add Kotlin to PATH
        run: |
          echo "${{ github.workspace }}/kotlinc/bin" >> $GITHUB_PATH
          echo "~/kotlinc/bin" >> $GITHUB_PATH
      
      - name: ✅ Verify Kotlin installation
        run: |
          kotlinc -version
          echo "Kotlin is ready! 🚀"
      
      - name: 🧪 Test each recipe
        run: |
          echo "🧪 Starting kitchen tests..."
          echo ""
          
          FAILED=0
          TOTAL=0
          
          for file in $(grep -l "fun main" $(find src -name "*.kt" -type f) 2>/dev/null || true); do
            TOTAL=$((TOTAL + 1))
            echo "🔪 Testing: $file"
            
            # Chạy file Kotlin bằng script mode
            if kotlinc -script "$file" > /tmp/output.txt 2>&1; then
              echo "   ✅ PASSED"
            else
              echo "   ❌ FAILED"
              echo "   📜 Output:"
              cat /tmp/output.txt | sed 's/^/      /'
              FAILED=$((FAILED + 1))
            fi
            echo ""
          done
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Results: $((TOTAL - FAILED))/$TOTAL passed"
          
          if [ $FAILED -ne 0 ]; then
            echo "❌ $FAILED recipe(s) failed!"
            exit 1
          else
            echo "🎉 All recipes passed! Bon appétit!"
            exit 0
          fi
