name: Issue Reviewer (Gemini)

on:
  issues:
    types: [opened]           # Tự động khi có issue mới
  workflow_dispatch:          # 👈 Cho phép chạy tay
    inputs:
      issue_number:
        description: 'Issue number to review'
        required: true
        type: number
      custom_message:
        description: 'Custom message (optional)'
        required: false
        type: string

jobs:
  review-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Get issue content
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Chạy tay: lấy issue từ input
            ISSUE_NUM=${{ inputs.issue_number }}
            echo "Manual trigger for issue #$ISSUE_NUM"
            
            curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM" > /tmp/issue.json
          else
            # Tự động: lấy từ event
            cat $GITHUB_EVENT_PATH > /tmp/issue.json
          fi
          
          jq -r '.title' /tmp/issue.json > /tmp/issue_title.txt
          jq -r '.body' /tmp/issue.json > /tmp/issue_body.txt
          jq -r '.number' /tmp/issue.json > /tmp/issue_number.txt
      
      - name: Call Gemini API
        id: gemini
        run: |
          TITLE=$(cat /tmp/issue_title.txt)
          BODY=$(head -c 1500 /tmp/issue_body.txt)
          CUSTOM="${{ inputs.custom_message }}"
          
          PROMPT="You are KotlinCookBot. Respond to this issue:
          Title: $TITLE
          Body: $BODY
          ${CUSTOM:+Additional context: $CUSTOM}
          
          Keep response short, friendly, use emojis."
          
          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -sR .)
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{
                \"parts\": [{
                  \"text\": $ESCAPED_PROMPT
                }]
              }]
            }")
          
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "Sorry, error!"' > /tmp/gemini_response.txt
      
      - name: Add comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issueNum = parseInt(fs.readFileSync('/tmp/issue_number.txt', 'utf8'));
            const response = fs.readFileSync('/tmp/gemini_response.txt', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: issueNum,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **KotlinCookBot (Gemini)** says:\n\n${response}\n\n---\n*🔧 Manual run by @${{ github.actor }}*`
            });
