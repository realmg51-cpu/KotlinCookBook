name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Kotlin
        uses: actions/setup-kotlin@v1
        with:
          kotlin-version: '2.0.20'
      
      - name: Compile tests
        run: |
          mkdir -p build/classes
          kotlinc src/test/kotlin/*.kt -d build/classes
      
      - name: Run tests
        run: |
          kotlin -cp build/classes org.junit.platform.console.ConsoleLauncher execute --scan-classpath
