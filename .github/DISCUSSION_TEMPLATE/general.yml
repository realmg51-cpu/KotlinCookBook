title: "General Discussion"
labels: ["discussion"]
body:
  - type: markdown
    attributes:
      value: |
        ## 👋 Welcome to KotlinCookBook Discussions!
        
        This is a place to connect with other Kotlin learners and chefs! 🍳
        
        ---
  
  - type: input
    id: topic
    attributes:
      label: "📌 Topic"
      placeholder: "What would you like to discuss?"
    validations:
      required: true
  
  - type: textarea
    id: content
    attributes:
      label: "💬 Discussion"
      placeholder: "Share your thoughts, questions, or ideas..."
    validations:
      required: true
  
  - type: dropdown
    id: experience
    attributes:
      label: "🍳 Experience Level"
      options:
        - "🥚 Complete Beginner"
        - "🍜 Learning Kotlin"
        - "👨‍🍳 Comfortable with basics"
        - "🔥 Kotlin Master"
    validations:
      required: false
  
  - type: checkboxes
    id: guidelines
    attributes:
      label: "📋 Guidelines"
      options:
        - label: "I have read and agree to follow the [Code of Conduct](https://github.com/realmg51-cpu/KotlinCookBook/blob/main/CODE_OF_CONDUCT.md)"
          required: true
